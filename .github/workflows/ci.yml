name: CI

on:
  push:
    branches: [main, '**']
  pull_request:
    branches: [main]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Typecheck
        id: typecheck
        continue-on-error: true
        env:
          NO_COLOR: '1'
        run: tsc --noEmit 2>&1 | tee typecheck-output.txt

      - name: Test
        id: test
        continue-on-error: true
        run: vitest run --project tier1 --project tier2 --reporter=default --reporter=junit --outputFile=test-results.xml

      # Report generation step (task 1.2)

      # Post PR comment step (task 1.3)

      # Fallback to step summary (task 1.4)
