name: CI

on:
  push:
    branches: [main, '**']
  pull_request:
    branches: [main]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Typecheck
        id: typecheck
        continue-on-error: true
        env:
          NO_COLOR: '1'
        run: tsc --noEmit 2>&1 | tee typecheck-output.txt

      - name: Test
        id: test
        continue-on-error: true
        run: vitest run --project tier1 --project tier2 --reporter=default --reporter=junit --outputFile=test-results.xml

      - name: Generate Report
        if: always()
        run: |
          bash scripts/ci-report.sh \
            --junit test-results.xml \
            --typecheck typecheck-output.txt \
            --run-link "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --typecheck-outcome "${{ steps.typecheck.outcome }}" \
            --test-outcome "${{ steps.test.outcome }}" \
            --output report.md

      # Note: when feature flag is off, this step is *skipped* (not failed).
      # Fallback-summary only triggers on failure, not skip — intentional.
      - name: Post PR Comment
        id: post-comment
        if: always() && github.event_name == 'pull_request' && vars.ENABLE_PR_COMMENTS == 'true'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr comment ${{ github.event.pull_request.number }} --body-file report.md

      # Fallback to step summary (task 1.4)
